*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{position:fixed;inset:0;overflow:hidden;background:#080105;touch-action:none;
  -webkit-user-select:none;user-select:none;width:100%;height:100%}
canvas{position:fixed;inset:0;display:block}
.txt{position:fixed;left:50%;transform:translate(-50%,-40%) scale(.94);opacity:0;
  text-align:center;white-space:nowrap;pointer-events:none;
  transition:opacity .9s cubic-bezier(.22,1,.36,1),transform .9s cubic-bezier(.22,1,.36,1)}
.txt.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
.txt.hide{opacity:0;transform:translate(-50%,-58%) scale(.97)}
#n{font-family:'GV',cursive;color:#fff1f6;font-size:min(19vw,150px);line-height:1;
  text-shadow:0 0 14px rgba(255,160,185,.85),0 0 34px rgba(250,195,145,.55),0 0 70px rgba(255,120,160,.35)}
#l2{font-family:'Pop',sans-serif;font-weight:300;color:#f5c97e;font-size:min(5.4vw,42px);
  letter-spacing:.32em;padding-left:.32em;
  text-shadow:0 0 10px rgba(200,140,70,.8),0 0 26px rgba(255,190,120,.5)}
#l3{font-family:'PopIt',sans-serif;font-style:italic;font-weight:300;color:#ffd3dc;font-size:min(5vw,40px);
  letter-spacing:.03em;text-shadow:0 0 10px rgba(230,110,140,.8),0 0 24px rgba(255,160,175,.5)}
#ta{font-family:'GV',cursive;color:#fff3f7;font-size:min(13vw,96px);line-height:1;
  text-shadow:0 0 14px rgba(255,150,180,.9),0 0 40px rgba(255,110,150,.55),0 0 80px rgba(250,190,140,.35)}
#sig{display:flex;flex-direction:column;align-items:center;gap:8px}
#sig .s1{font-family:'Cav',cursive;color:#ffe6ee;font-size:min(8.5vw,62px);
  text-shadow:0 0 12px rgba(255,160,185,.7)}
#sig .s2{font-family:'PopIt',sans-serif;font-style:italic;color:rgba(255,205,218,.62);font-size:min(3.6vw,17px);letter-spacing:.06em}
#ded{font-family:'PopIt',sans-serif;font-style:italic;color:#ffcdd9;font-size:min(5.5vw,42px);
  letter-spacing:.04em;text-shadow:0 0 12px rgba(230,110,140,.75),0 0 30px rgba(255,160,175,.4)}
#l2b{font-family:'PopIt',sans-serif;font-style:italic;color:#ffc3d0;font-size:min(4.8vw,38px);
  text-shadow:0 0 10px rgba(230,110,140,.7),0 0 24px rgba(255,160,175,.45)}
#l2c{font-family:'PopIt',sans-serif;font-style:italic;color:#ffd0db;font-size:min(5vw,40px);
  text-shadow:0 0 10px rgba(230,110,140,.75),0 0 26px rgba(255,160,175,.45)}
#cd{display:flex;flex-direction:column;align-items:center;gap:2px}
#cd .num{font-family:'Pop',sans-serif;font-weight:300;color:#f5c97e;font-size:min(19vw,140px);line-height:1;
  text-shadow:0 0 16px rgba(230,170,90,.75),0 0 44px rgba(255,190,120,.4)}
#cd .lbl{font-family:'PopIt',sans-serif;font-style:italic;color:rgba(255,205,218,.85);font-size:min(4.2vw,20px);letter-spacing:.08em}
#tlayer{position:fixed;inset:0;pointer-events:none;will-change:transform}
.split span{display:inline-block;opacity:0;filter:blur(8px);transform:translateY(10px);
  transition:opacity .55s ease,filter .55s ease,transform .55s ease}
.split.show span{opacity:1;filter:blur(0);transform:none}
#hint{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(env(safe-area-inset-bottom,0px) + 86px);
  font-family:'PopIt',sans-serif;font-style:italic;color:rgba(255,200,215,.55);font-size:15px;
  opacity:0;transition:opacity 1.2s;pointer-events:none}
#hint.show{opacity:1}
#replay{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(env(safe-area-inset-bottom,0px) + 26px);

  transition:opacity .8s;cursor:pointer}
#start.hide{opacity:0;pointer-events:none}
#start .pre{font-family:'PopIt',sans-serif;font-style:italic;color:rgba(255,200,215,.75);font-size:19px;letter-spacing:.06em}
#start .h2{font-family:'Pop',sans-serif;font-weight:300;color:rgba(255,220,230,.55);font-size:14px;letter-spacing:.22em}
#bigheart{width:96px;height:88px;animation:pulse 1.6s ease-in-out infinite;
  filter:drop-shadow(0 0 18px rgba(255,107,154,.85)) drop-shadow(0 0 46px rgba(235,68,98,.5))}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
</style>

<script>
"use strict";
try{console.log("%csi estás leyendo esto, María... sí, lo hice yo 🌹 — Fabi","color:#ff6b9a;font-size:14px")}catch(e){}
// TODO: no tocar, funciona (Fabi)
window.addEventListener('error',function(ev){try{
  var d=document.createElement('div');
  d.style.cssText='position:fixed;left:8px;bottom:8px;z-index:999;color:#ff9a9a;font:11px monospace;max-width:90vw;word-break:break-all;background:rgba(0,0,0,.55);padding:4px 8px;border-radius:6px';
  d.textContent='ups (mandale esto a fabi): '+(ev.message||ev.type);
  document.body.appendChild(d);}catch(e){}});
// mates y easings. no preguntes, funcionan
var TAU=Math.PI*2;
function clamp01(x){return x<0?0:(x>1?1:x)}
function easeOut(u){u=clamp01(u);return 1-Math.pow(1-u,3)}
function easeInOut(u){u=clamp01(u);return u<.5?4*u*u*u:1-Math.pow(-2*u+2,3)/2}
function win(t,a,b){return clamp01((t-a)/(b-a))}
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;var t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}

// los tiempos de cada momento. los toqué mil veces hasta que respiraban bien
var POP0=1.15,POP1=1.50,GROW0=1.50,GROW1=5.50;
var RINGS_T={4:[1.35,3.45],3:[1.85,4.05],2:[2.35,4.60],1:[2.85,5.10],0:[3.35,5.55]};
var PULSE1=5.45,TXT1=5.30,TXT2=7.10,TXT2B=9.20,L2OUT=11.00,TXT3=11.40,TXT4=13.20,OUT2=15.10,TXT2C=15.60,CD_T=17.30,TXT5=18.80,BURST_T=13.35,HEART0=4.60,DED0=0.25,DED1=1.55,RAIN_T=18.60;
var TARGET='2026-07-19'; // <-- el día que vuelvo a verte. ojalá pudiera acercarlo desde aquí
function daysLeft(){var now=new Date();var tgt=new Date(TARGET+'T00:00:00');
  var hoy=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  return Math.round((tgt-hoy)/86400000);}
function setCountdown(){var d=daysLeft();
  var num=document.querySelector('#cd .num'),lbl=document.querySelector('#cd .lbl');
  if(d>1){num.textContent=d;lbl.textContent='días para volver a verte';}
  else if(d===1){num.textContent='1';lbl.textContent='día para volver a verte';}
  else if(d===0){num.textContent='❤';lbl.textContent='es hoy, nos vemos';}
  else{num.textContent='∞';lbl.textContent='contigo, siempre';}}

// escala todo a un lienzo virtual para que se vea igual en cualquier móvil
var VW=1080,VH=1920,CXv=540,CYv=1225;
var cv=document.getElementById('c'),ctx=cv.getContext('2d');
var tlayer=document.getElementById('tlayer');
var parX=0,parY=0,ptX=0,ptY=0,beta0=null,tiltOn=false;
function onTilt(e){if(e.gamma==null&&e.beta==null)return;tiltOn=true;
  if(beta0===null)beta0=e.beta||0;
  ptX=Math.max(-22,Math.min(22,(e.gamma||0)*.85));
  ptY=Math.max(-16,Math.min(16,((e.beta||0)-beta0)*.6));}
window.addEventListener('deviceorientation',onTilt);
window.addEventListener('pointermove',function(e){if(tiltOn)return;
  ptX=(e.clientX-Wpx/2)/Wpx*26;ptY=(e.clientY-Hpx/2)/Hpx*18;});
var Wpx,Hpx,S,OX,OY,DPR;
function layout(){
  DPR=Math.min(window.devicePixelRatio||1,2);
  Wpx=window.innerWidth;Hpx=window.innerHeight;
  cv.width=Wpx*DPR;cv.height=Hpx*DPR;
  cv.style.width=Wpx+'px';cv.style.height=Hpx+'px';
  S=Math.min(Wpx/VW,Hpx/VH);OX=(Wpx-VW*S)/2;OY=(Hpx-VH*S)/2;
  placeText();
}
function vy2px(vy){return OY+vy*S}
function placeText(){
  document.getElementById('n').style.top=vy2px(360)+'px';
  document.getElementById('l2').style.top=vy2px(505)+'px';
  document.getElementById('l2b').style.top=vy2px(612)+'px';
  document.getElementById('l3').style.top=vy2px(615)+'px';
  document.getElementById('ta').style.top=vy2px(735)+'px';
  document.getElementById('sig').style.top=vy2px(1800)+'px';
  document.getElementById('ded').style.top=vy2px(560)+'px';
  document.getElementById('l2c').style.top=vy2px(505)+'px';
  document.getElementById('cd').style.top=vy2px(665)+'px';
}
window.addEventListener('resize',layout);

// la rosa. tres noches para que no pareciera un molinillo, pero mírala ahora
var RING_GEO={
  0:{n:4, r:8,  L:120, rr:0,  c:['#3D0812','#7A1128','#B03A52']},
  1:{n:5, r:22, L:172, rr:38, c:['#45091A','#96152F','#D14B66']},
  2:{n:7, r:44, L:228, rr:14, c:['#4A0A1C','#AD1B3B','#E85A78']},
  3:{n:8, r:68, L:292, rr:42, c:['#500B1E','#C22347','#F76E8C']},
  4:{n:9, r:94, L:336, rr:20, c:['#520C20','#CE2B50','#FF8FA8']}
};
var JIT={},rj=mulberry32(77);
for(var li=0;li<=4;li++){for(var k=0;k<RING_GEO[li].n;k++){
  JIT[li+'_'+k]=[rj()*10-5, .96+rj()*.08, .95+rj()*.10];
}}
function petalPath(L){
  var Wm=L*.82,p=new Path2D(),first=true,pts=[];
  for(var i=0;i<=46;i++){
    var s=i/46*.97,tt=.06+.94*s;
    var w=Wm*.5*Math.pow(Math.sin(tt*Math.PI),.85)*(1-.30*Math.pow(s,2.5));
    pts.push([-w,-L*s]);
  }
  for(i=0;i<pts.length;i++){if(first){p.moveTo(pts[i][0],pts[i][1]);first=false}else p.lineTo(pts[i][0],pts[i][1])}
  var tipY=pts[pts.length-1][1];
  p.lineTo(0,tipY+L*.045);
  for(i=pts.length-1;i>=0;i--)p.lineTo(-pts[i][0],pts[i][1]);
  p.closePath();return p;
}
var PETALS={};
for(li=0;li<=4;li++){
  var g=RING_GEO[li],grad=ctx.createLinearGradient(0,0,0,-g.L);
  grad.addColorStop(0,g.c[0]);grad.addColorStop(.55,g.c[1]);grad.addColorStop(1,g.c[2]);
  var sh=ctx.createRadialGradient(0,0,0,0,0,g.L*.22);
  sh.addColorStop(0,'rgba(20,2,8,.45)');sh.addColorStop(1,'rgba(20,2,8,0)');
  PETALS[li]={path:petalPath(g.L),grad:grad,shadow:sh};
}
function roseState(t){
  var s;
  if(t<POP0)s=0;
  else if(t<POP1)s=.03+.21*easeOut(win(t,POP0,POP1));
  else if(t<GROW1)s=.24+.76*easeInOut(win(t,GROW0,GROW1));
  else s=1+.013*Math.sin(TAU*(t-GROW1)/3.6);
  return[s,-14+2.1*t];
}
function drawRose(t){
  var st=roseState(t),Sg=st[0],grot=st[1];
  if(Sg<=0)return;
  for(var i=0;i<5;i++){
    var li=[4,3,2,1,0][i],g=RING_GEO[li];
    var b=win(t,RINGS_T[li][0],RINGS_T[li][1]),eb=easeInOut(b);
    if(li===0)eb*=.80;
    var alpha=b>0?Math.min(1,b*3.2):0;
    if(alpha<=0)continue;
    var Ls=.30+.70*eb,Ws=.55+.45*eb;
    var reff=g.r*(.12+.88*eb)*Sg;
    var unf=(1-eb)*(18-li*2);
    for(var kk=0;kk<g.n;kk++){
      var j=JIT[li+'_'+kk];
      var az=(g.rr+grot+unf+kk*360/g.n+j[0])*Math.PI/180;
      ctx.save();
      ctx.translate(CXv,CYv);ctx.rotate(az);ctx.translate(0,-reff*j[2]);
      ctx.scale(Sg*Ws*j[1],Sg*Ls*j[1]);
      ctx.globalAlpha=alpha;
      ctx.fillStyle=PETALS[li].grad;ctx.fill(PETALS[li].path);
      ctx.globalAlpha=alpha*.5;
      ctx.strokeStyle='rgba(255,194,207,.9)';ctx.lineWidth=g.L*.014;
      ctx.stroke(PETALS[li].path);
      ctx.globalAlpha=alpha*.18;
      ctx.strokeStyle='#ffcdd7';ctx.lineWidth=g.L*.008;
      ctx.beginPath();ctx.moveTo(0,-g.L*.08);ctx.lineTo(0,-g.L*.9);ctx.stroke();
      ctx.globalAlpha=alpha;ctx.fillStyle=PETALS[li].shadow;
      ctx.beginPath();ctx.arc(0,0,g.L*.22,0,TAU);ctx.fill();
      ctx.restore();
    }
  }
  var cb=easeInOut(win(t,RINGS_T[0][0],RINGS_T[0][1]));
  if(cb>.05){
    var r=70*Sg*(.5+.5*cb);
    var gsw=ctx.createRadialGradient(CXv,CYv,0,CXv,CYv,r);
    gsw.addColorStop(0,'rgba(36,4,12,'+(Math.min(1,cb*2)*.92)+')');
    gsw.addColorStop(1,'rgba(36,4,12,0)');
    ctx.fillStyle=gsw;ctx.beginPath();ctx.arc(CXv,CYv,r,0,TAU);ctx.fill();
  }
  ctx.globalAlpha=1;
}

// rayos de luz girando detrás. el toque épico
var rays=document.createElement('canvas');rays.width=rays.height=1100;
(function(){
  var rc=rays.getContext('2d');rc.translate(550,550);
  var fg=rc.createRadialGradient(0,0,120,0,0,540);
  fg.addColorStop(0,'rgba(255,198,150,.13)');fg.addColorStop(.7,'rgba(255,198,150,.05)');fg.addColorStop(1,'rgba(255,198,150,0)');
  for(var i=0;i<16;i++){
    var a=i*TAU/16,w=3.2*Math.PI/180;
    rc.beginPath();rc.moveTo(0,0);
    rc.lineTo(Math.cos(a-w)*550,Math.sin(a-w)*550);
    rc.lineTo(Math.cos(a+w)*550,Math.sin(a+w)*550);
    rc.closePath();rc.fillStyle=fg;rc.fill();
  }
})();
function drawRays(t){
  var Sg=roseState(t)[0];if(Sg<=.04)return;
  var kk=Math.min(1,win(t,POP1,GROW1)+.15)*(.85+.15*Math.sin(t*1.7));
  ctx.save();ctx.translate(CXv,CYv);ctx.rotate(-t*9*Math.PI/180);
  ctx.globalAlpha=kk*Math.min(1,Sg*1.4);
  ctx.globalCompositeOperation='lighter';
  ctx.drawImage(rays,-550,-550);
  ctx.restore();ctx.globalCompositeOperation='source-over';ctx.globalAlpha=1;
}

// anillos que se expanden en los momentos importantes
function drawPulse(t,t0,col){
  var u=win(t,t0,t0+.95);if(u<=0||u>=1)return;
  var e=easeOut(u),r=230+330*e;
  ctx.save();ctx.globalAlpha=(1-e)*.62;
  ctx.strokeStyle=col;ctx.lineWidth=9*(1-e)+2;
  ctx.shadowColor=col;ctx.shadowBlur=18;
  ctx.beginPath();ctx.ellipse(CXv,CYv,r,r*.98,0,0,TAU);ctx.stroke();
  ctx.restore();
}

// corazones flotando. la física es casera pero honesta
function heartSprite(fill,glow){
  var sz=170,oc=document.createElement('canvas');oc.width=oc.height=sz;
  var o=oc.getContext('2d'),kf=sz/38,p=new Path2D();
  for(var i=0;i<=120;i++){
    var tt=i/120*TAU;
    var x=16*Math.pow(Math.sin(tt),3);
    var y=13*Math.cos(tt)-5*Math.cos(2*tt)-2*Math.cos(3*tt)-Math.cos(4*tt);
    var px=sz/2+x*kf,py=sz/2-y*kf;
    if(i===0)p.moveTo(px,py);else p.lineTo(px,py);
  }
  p.closePath();
  o.shadowColor=glow;o.shadowBlur=14;o.fillStyle=fill;o.fill(p);
  o.shadowBlur=0;o.fill(p);
  var hg=o.createRadialGradient(sz*.37,sz*.30,2,sz*.37,sz*.30,sz*.10);
  hg.addColorStop(0,'rgba(255,255,255,.55)');hg.addColorStop(1,'rgba(255,255,255,0)');
  o.fillStyle=hg;o.beginPath();o.arc(sz*.37,sz*.30,sz*.10,0,TAU);o.fill();
  return oc;
}
var HS=[heartSprite('#ff6b9a','#ff96b9'),heartSprite('#eb4462','#ff6e82'),heartSprite('#f7cb7a','#ffe2a0')];
var hearts=[],hAcc=0,burstDone=false,rh=mulberry32(2026);
function pick(){var v=rh();return v<.48?0:(v<.78?1:2)}
function spawnAmbient(){
  var a=rh()*TAU,rad=250+rh()*180;
  hearts.push({k:'a',x0:CXv+Math.cos(a)*rad,y0:CYv+Math.sin(a)*rad*.9,
    vx:rh()*64-32,vy:-(95+rh()*70),swA:14+rh()*20,swF:1.2+rh()*1.2,ph:rh()*TAU,
    size:26+rh()*36,life:4.2+rh()*1.8,age:0,rot:rh()*28-14,vr:rh()*18-9,spr:pick()});
}
function spawnBurst(x,y,n,spd0){
  for(var i=0;i<n;i++){
    var a=(i*TAU/n)+(rh()*.3-.15);
    hearts.push({k:'b',x0:x,y0:y,dx:Math.cos(a),dy:Math.sin(a),spd:spd0*(0.7+rh()*0.6),
      trav:0,vy2:0,size:24+rh()*30,life:2.2+rh()*1.0,age:0,rot:rh()*40-20,vr:rh()*28-14,spr:pick()});
  }
}
function stepHearts(t,dt){
  if(t>=HEART0){
    var rate=t<21.0?2.4:1.2;
    hAcc+=rate*dt;
    while(hAcc>=1){hAcc--;var na=0;for(var i=0;i<hearts.length;i++)if(hearts[i].k==='a')na++;
      if(na<22)spawnAmbient();}
  }
  if(!burstDone&&t>=BURST_T){burstDone=true;spawnBurst(CXv,CYv,16,320);spawnPetalBurst()}
  for(i=hearts.length-1;i>=0;i--){
    var p=hearts[i];p.age+=dt;p.rot+=p.vr*dt;
    if(p.k==='b'){p.spd*=Math.exp(-1.7*dt);p.trav+=p.spd*dt;p.vy2-=55*dt}
    if(p.age>=p.life)hearts.splice(i,1);
  }
}
function drawHearts(){
  for(var i=0;i<hearts.length;i++){
    var p=hearts[i];
    var aIn=clamp01(p.age/.45),aOut=clamp01((p.life-p.age)/.9);
    var al=.92*Math.min(aIn,aOut);if(al<=.02)continue;
    var x,y;
    if(p.k==='a'){x=p.x0+p.vx*p.age+Math.sin(p.age*p.swF+p.ph)*p.swA;y=p.y0+p.vy*p.age}
    else{x=p.x0+p.dx*p.trav;y=p.y0+p.dy*p.trav+p.vy2*p.age}
    ctx.save();ctx.translate(x,y);ctx.rotate(p.rot*Math.PI/180);ctx.globalAlpha=al;
    ctx.drawImage(HS[p.spr],-p.size/2,-p.size/2,p.size,p.size);
    ctx.restore();
  }
  ctx.globalAlpha=1;
}

// pétalos que se sueltan de la rosa. mi parte favorita
var petalSpr=document.createElement('canvas');petalSpr.width=120;petalSpr.height=132;
(function(){var o=petalSpr.getContext('2d');o.translate(60,126);
  var g=o.createLinearGradient(0,0,0,-110);
  g.addColorStop(0,'#8a2743');g.addColorStop(.55,'#d9486b');g.addColorStop(1,'#ff9fb4');
  var pp=petalPath(110);o.fillStyle=g;o.fill(pp);
  o.strokeStyle='rgba(255,205,216,.8)';o.lineWidth=2;o.stroke(pp);})();
var petals=[],pAcc=0,pulses=[],stars=[],nextStar=3.5,rain=[],rainAcc=0;
function stepPetals(t,dt){
  if(t>6){pAcc+=0.7*dt;
    while(pAcc>=1){pAcc--;
      if(petals.length<8){var a=Math.random()*TAU,S0=roseState(t)[0];var r=(360+Math.random()*60)*S0;
        petals.push({x:CXv+Math.cos(a)*r,y:CYv+Math.sin(a)*r*.95,vx:Math.random()*44-22,vy:40+Math.random()*55,
          sw:14+Math.random()*22,f:.9+Math.random()*1.2,ph:Math.random()*TAU,rot:Math.random()*360,
          vr:Math.random()*50-25,size:26+Math.random()*20,age:0,life:5+Math.random()*2});}}}
  for(var i=petals.length-1;i>=0;i--){var p=petals[i];p.age+=dt;p.rot+=p.vr*dt;p.x+=p.vx*dt;p.y+=p.vy*dt;
    if(p.age>=p.life)petals.splice(i,1);}
}
function spawnPetalBurst(){
  for(var k=0;k<6;k++){var a=-Math.PI/2+(k-2.5)*.5+Math.random()*.2;
    petals.push({x:CXv,y:CYv,vx:Math.cos(a)*(120+Math.random()*120),vy:Math.sin(a)*80+60+Math.random()*60,
      sw:18,f:1.4,ph:Math.random()*TAU,rot:Math.random()*360,vr:Math.random()*80-40,
      size:30+Math.random()*18,age:0,life:4+Math.random()*1.5});}
}
function drawPetals(){
  for(var i=0;i<petals.length;i++){var p=petals[i];
    var aIn=clamp01(p.age/.5),aOut=clamp01((p.life-p.age)/1.2),al=.9*Math.min(aIn,aOut);
    var xx=p.x+Math.sin(p.age*p.f+p.ph)*p.sw;
    ctx.save();ctx.translate(xx,p.y);ctx.rotate(p.rot*Math.PI/180);ctx.globalAlpha=al;
    var sc=p.size/120;ctx.scale(sc,sc);ctx.drawImage(petalSpr,-60,-126);ctx.restore();}
  ctx.globalAlpha=1;
}
// la lluvia de mini corazones del final
function stepRain(t,dt){
  if(t>RAIN_T){
    var ramp=clamp01((t-RAIN_T)/2);
    rainAcc+=10*ramp*dt;
    while(rainAcc>=1){rainAcc--;
      if(rain.length<60)rain.push({x:Math.random()*VW,y:-50,vx:Math.random()*24-12,
        vy:130+Math.random()*110,sw:6+Math.random()*10,f:1.5+Math.random(),ph:Math.random()*TAU,
        rot:Math.random()*360,vr:Math.random()*120-60,size:10+Math.random()*12,
        spr:pick(),age:0});}}
  for(var i=rain.length-1;i>=0;i--){var p=rain[i];p.age+=dt;p.rot+=p.vr*dt;
    p.x+=p.vx*dt;p.y+=p.vy*dt;
    if(p.y>VH+60)rain.splice(i,1);}
}
function drawRain(){
  for(var i=0;i<rain.length;i++){var p=rain[i];
    var al=.8*clamp01(p.age/.4);
    var xx=p.x+Math.sin(p.age*p.f+p.ph)*p.sw;
    var im=heart_img_mini(p.spr,p.size,p.rot);
    ctx.globalAlpha=al;
    ctx.drawImage(im,xx-im.width/2,p.y-im.height/2);}
  ctx.globalAlpha=1;
}
var _miniCache={};
function heart_img_mini(i,size,rot){
  var key=i+'_'+(size|0)+'_'+((rot/8|0)*8);
  var im=_miniCache[key];
  if(!im){var c=document.createElement('canvas');var s2=Math.max(8,size|0)+8;
    c.width=c.height=s2;var o=c.getContext('2d');
    o.translate(s2/2,s2/2);o.rotate(((rot/8|0)*8)*Math.PI/180);
    o.drawImage(HS[i],-size/2,-size/2,size,size);
    if(Object.keys(_miniCache).length>400)_miniCache={};
    _miniCache[key]=c;im=c;}
  return im;
}
// estrellas fugaces de vez en cuando. pide un deseo
function drawStars(t){
  if(t>nextStar){nextStar=t+7+Math.random()*5;
    var fromL=Math.random()<.5,y0s=120+Math.random()*320;
    stars.push({t0:t,x0:fromL?-80:VW+80,y0:y0s,
      x1:fromL?VW*0.55+Math.random()*300:VW*0.45-Math.random()*300,y1:y0s+140+Math.random()*160,dur:.9});}
  for(var i=stars.length-1;i>=0;i--){var s=stars[i];var p=(t-s.t0)/s.dur;
    if(p>=1){stars.splice(i,1);continue}
    var al=Math.sin(p*Math.PI);
    for(var k=0;k<8;k++){var q=p-k*.022;if(q<0)break;
      var tx=s.x0+(s.x1-s.x0)*q,ty=s.y0+(s.y1-s.y0)*q,sz=Math.max(6,26-k*2.6);
      ctx.globalAlpha=al*(1-k/9)*.85;ctx.drawImage(glowDot,tx-sz/2,ty-sz/2,sz,sz);}}
  ctx.globalAlpha=1;
}
// brillitos, bokeh y la intro de partículas que lo empieza todo
var glowDot=document.createElement('canvas');glowDot.width=glowDot.height=64;
(function(){var o=glowDot.getContext('2d');
  var gd=o.createRadialGradient(32,32,0,32,32,32);
  gd.addColorStop(0,'rgba(255,236,210,1)');gd.addColorStop(.35,'rgba(255,236,210,.45)');gd.addColorStop(1,'rgba(255,236,210,0)');
  o.fillStyle=gd;o.fillRect(0,0,64,64);})();
var r2=mulberry32(9),TW=[],BK=[],bkc=['255,190,150','255,140,175','250,205,120'];
for(var i2=0;i2<48;i2++)TW.push([30+r2()*(VW-60),40+r2()*(VH-80),1.1+r2()*1.5,r2()*TAU,8+r2()*12]);
for(i2=0;i2<15;i2++)BK.push([r2()*VW,r2()*VH,r2()*14-7,r2()*10-5,60+r2()*110,bkc[Math.floor(r2()*3)],(10+r2()*12)/255]);
var CONV=[],r5=mulberry32(5);
for(i2=0;i2<46;i2++)CONV.push([r5()*TAU,430+r5()*490,.05+r5()*.45,.55+r5()*.25,4+r5()*5]);
function drawIntro(t){
  if(t>1.75)return;
  for(var i=0;i<CONV.length;i++){
    var c=CONV[i],u=win(t,c[2],c[2]+c[3]);
    if(u<=0||u>=1)continue;
    var e=easeInOut(u),r=c[1]*(1-e)+22*e;
    var x=CXv+Math.cos(c[0])*r,y=CYv+Math.sin(c[0])*r*.95;
    var al=Math.pow(Math.sin(u*Math.PI),.7)*.9,s=c[4]*3;
    ctx.globalAlpha=al;ctx.drawImage(glowDot,x-s/2,y-s/2,s,s);
  }
  var rr,al2;
  if(t<POP0){var I=easeInOut(win(t,.18,POP0));rr=40+200*I;al2=I}
  else{var u2=win(t,POP0,1.55);rr=240+260*easeOut(u2);al2=1-u2}
  if(al2>.02&&rr>4){ctx.globalAlpha=al2;ctx.drawImage(glowDot,CXv-rr/2,CYv-rr/2,rr,rr)}
  ctx.globalAlpha=1;
}
function drawSparkles(t){
  for(var i=0;i<TW.length;i++){
    var s=TW[i],v=Math.sin(t*s[2]+s[3]);if(v<.15)continue;
    var al=Math.pow(v,2.5)*.65,sz=s[4]*(0.8+0.4*v)*2;
    ctx.globalAlpha=al;ctx.drawImage(glowDot,s[0]-sz/2,s[1]-sz/2,sz,sz);
  }
  ctx.globalAlpha=1;
}
function drawBokeh(t){
  for(var i=0;i<BK.length;i++){
    var b=BK[i];
    var x=((b[0]+b[2]*t)%(VW+200)+VW+200)%(VW+200)-100;
    var y=((b[1]+b[3]*t)%(VH+200)+VH+200)%(VH+200)-100;
    var g=ctx.createRadialGradient(x,y,0,x,y,b[4]/2);
    g.addColorStop(0,'rgba('+b[5]+','+b[6]+')');g.addColorStop(1,'rgba('+b[5]+',0)');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,b[4]/2,0,TAU);ctx.fill();
  }
}

// el fondo oscuro y la viñeta, para que todo brille más
function drawBG(){
  var lg=ctx.createLinearGradient(0,0,0,Hpx);
  lg.addColorStop(0,'#20060F');lg.addColorStop(.55,'#12030A');lg.addColorStop(1,'#080105');
  ctx.fillStyle=lg;ctx.fillRect(0,0,Wpx,Hpx);
  var gx=OX+CXv*S,gy=OY+CYv*S,gr=640*S;
  var rg=ctx.createRadialGradient(gx,gy,0,gx,gy,gr);
  rg.addColorStop(0,'rgba(86,18,36,.55)');rg.addColorStop(1,'rgba(86,18,36,0)');
  ctx.fillStyle=rg;ctx.fillRect(0,0,Wpx,Hpx);
}
function drawVignette(){
  var m=Math.max(Wpx,Hpx);
  var vg=ctx.createRadialGradient(Wpx/2,Hpx/2,m*.30,Wpx/2,Hpx/2,m*.72);
  vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,.5)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,Wpx,Hpx);
}

// el guion: qué aparece, cuándo, y por qué en ese orden
var playing=false,t0=0,shown={},hintDone=false;
function begin(){
  playing=true;t0=performance.now();
  hearts=[];hAcc=0;burstDone=false;shown={};hintDone=false;
  petals=[];pAcc=0;stars=[];nextStar=3.5+Math.random()*3;rain=[];rainAcc=0;
  pulses=[{t0:PULSE1,c:'rgba(255,208,120,1)'},{t0:BURST_T,c:'rgba(255,130,165,1)'}];
  setCountdown();
  ['n','l2','l3','ta','sig','ded','l2b','l2c','cd'].forEach(function(id){document.getElementById(id).classList.remove('show','hide')});
  document.getElementById('replay').classList.remove('show');
  document.getElementById('hint').classList.remove('show');
}
var startDone=false;
function arrancar(e){
  if(e&&e.cancelable)e.preventDefault();
  if(startDone)return;
  startDone=true;
  document.getElementById('start').classList.add('hide');
  begin();
  try{if(window.DeviceOrientationEvent&&DeviceOrientationEvent.requestPermission)
    DeviceOrientationEvent.requestPermission().catch(function(){});}catch(err){}
}
['pointerdown','touchend','click'].forEach(function(ev){
  document.getElementById('start').addEventListener(ev,arrancar,{passive:false});
});
var lastReplay=0;
function otraVez(e){
  if(e&&e.cancelable)e.preventDefault();
  if(e)e.stopPropagation();
  var n=Date.now();
  if(n-lastReplay<400)return;
  lastReplay=n;begin();
}
['pointerdown','click'].forEach(function(ev){
  document.getElementById('replay').addEventListener(ev,otraVez);
});
function toque(cx,cy){
  if(!playing)return;
  var vx=(cx-OX)/S,vy2=(cy-OY)/S;
  var tt=(performance.now()-t0)/1000;
  // si toca la rosa, sorpresita
  if(tt>5.6&&Math.hypot(vx-CXv,vy2-CYv)<320){
    spawnBurst(CXv,CYv,10,260);
    spawnPetalBurst();
    pulses.push({t0:tt,c:'rgba(255,208,120,1)'});
  } else spawnBurst(vx,vy2,7,220);
}
cv.addEventListener('pointerdown',function(e){toque(e.clientX,e.clientY)});
if(!window.PointerEvent)cv.addEventListener('touchstart',function(e){
  if(e.touches&&e.touches[0])toque(e.touches[0].clientX,e.touches[0].clientY)},{passive:true});
document.addEventListener('touchmove',function(e){e.preventDefault()},{passive:false});

var last=performance.now();
function loop(now){
  requestAnimationFrame(loop);
  var dt=Math.min((now-last)/1000,.05);last=now;
  parX+=(ptX-parX)*.06;parY+=(ptY-parY)*.06;
  tlayer.style.transform='translate3d('+(-parX*.5).toFixed(1)+'px,'+(-parY*.5).toFixed(1)+'px,0)';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  drawBG();
  if(playing){
    var t=(now-t0)/1000;
    stepHearts(t,dt);
    stepPetals(t,dt);
    stepRain(t,dt);
    ctx.setTransform(DPR*S,0,0,DPR*S,DPR*(OX+parX),DPR*(OY+parY));
    drawBokeh(t);
    drawRays(t);
    drawRose(t);
    for(var pi=pulses.length-1;pi>=0;pi--){if(t>pulses[pi].t0+1.1)pulses.splice(pi,1);else drawPulse(t,pulses[pi].t0,pulses[pi].c)}
    drawPetals();
    drawHearts();
    drawRain();
    drawIntro(t);
    drawSparkles(t);
    drawStars(t);
    ctx.setTransform(DPR,0,0,DPR,0,0);
    if(t>TXT1&&!shown.n){shown.n=1;document.getElementById('n').classList.add('show')}
    if(t>TXT2&&!shown.l2){shown.l2=1;document.getElementById('l2').classList.add('show')}
    if(t>DED0&&!shown.dd){shown.dd=1;document.getElementById('ded').classList.add('show')}
    if(t>DED1&&!shown.ddo){shown.ddo=1;document.getElementById('ded').classList.add('hide')}
    if(t>TXT2B&&!shown.l2b){shown.l2b=1;document.getElementById('l2b').classList.add('show')}
    if(t>L2OUT&&!shown.l2o){shown.l2o=1;document.getElementById('l2').classList.add('hide');document.getElementById('l2b').classList.add('hide')}
    if(t>TXT3&&!shown.l3){shown.l3=1;document.getElementById('l3').classList.add('show')}
    if(t>TXT4&&!shown.ta){shown.ta=1;document.getElementById('ta').classList.add('show')}
    if(t>OUT2&&!shown.o2){shown.o2=1;document.getElementById('l3').classList.add('hide');document.getElementById('ta').classList.add('hide')}
    if(t>TXT2C&&!shown.l2c){shown.l2c=1;document.getElementById('l2c').classList.add('show')}
    if(t>CD_T&&!shown.cd){shown.cd=1;document.getElementById('cd').classList.add('show')}
    if(t>TXT5&&!shown.sig){shown.sig=1;document.getElementById('sig').classList.add('show')}
    if(t>20.4&&!shown.rp){shown.rp=1;document.getElementById('replay').classList.add('show')}
    if(t>19.4&&t<22.4&&!hintDone){document.getElementById('hint').classList.add('show')}
    if(t>=22.4&&!hintDone){hintDone=true;document.getElementById('hint').classList.remove('show')}
  }else{
    ctx.setTransform(DPR*S,0,0,DPR*S,DPR*(OX+parX),DPR*(OY+parY));
    drawBokeh(now/1000);
    drawSparkles(now/1000);
    ctx.setTransform(DPR,0,0,DPR,0,0);
  }
  drawVignette();
}
function splitLetters(id,step){var el=document.getElementById(id);var txt=el.textContent;
  el.textContent='';el.classList.add('split');
  for(var i=0;i<txt.length;i++){var sp=document.createElement('span');
    sp.textContent=txt[i]===' '?'\u00A0':txt[i];
    sp.style.transitionDelay=(i*step).toFixed(2)+'s';el.appendChild(sp);}}
splitLetters('l3',0.045); // el nombre sale letra a letra, como si lo escribiera delante de ella
splitLetters('ta',0.10); // y esto, despacio, porque va en serio
layout();
requestAnimationFrame(loop);
</script>
